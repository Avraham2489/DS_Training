name: Auto Label on Review

on:
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Add needs-revision label on request-changes
        if: github.event.review.state == 'changes_requested'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_PAT }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-revision'],
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'complete',
            }).catch(() => {});

      - name: Remove needs-revision label on dismissed review
        if: github.event.review.state == 'dismissed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_PAT }}
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'needs-revision',
            }).catch(() => {});
